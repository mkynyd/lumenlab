services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-workspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_workspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
