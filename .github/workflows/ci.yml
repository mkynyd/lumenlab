name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_workspace?schema=public
  REDIS_URL: redis://localhost:6379
  AUTH_SECRET: ci-build-dummy-secret
  ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"

jobs:
  ci:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_workspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_workspace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci --include=dev
      - name: Prisma generate
        run: npx prisma generate
      - name: Lockfile immutability
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json
      - name: Lint
        run: npm run lint
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Test
        run: npm test -- --run
      - name: Migrate
        run: npx prisma migrate deploy
      - name: Build
        run: npm run build
      - name: Whitespace check
        run: git diff --check

  lockfile-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci --include=dev
      - name: Lockfile immutability
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json
